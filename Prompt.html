            ],
            "Change_Log": [
                { "Date": "2026-01-09", "Version": "1.0", "Prompt_ID": "ALL", "Change_Type": "Initial Release",
                    "Description_of_Change": "Initial creation of Internal Audit AI Prompt Library template with 44 prompts across all phases",
                    "Changed_By": "", "Approved_By": "", "Approval_Date": "" }
            ]
        };

        // ── State ──
        let currentTab = 'dashboard';
        let searchQuery = '';
        let filterSkill = 'all';
        let filterEngType = 'all';
        let userPrompts = JSON.parse(localStorage.getItem('userPrompts') || '[]');
        let ratings = JSON.parse(localStorage.getItem('promptRatings') || '{}');

        // ── Helpers ──
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function getPhasePrompts(phase) {
            const map = {
                'planning': [...LIBRARY_DATA.Planning_Phase, ...userPrompts.filter(p => p.phase === 'planning')],
                'fieldwork': [...LIBRARY_DATA.Fieldwork_Phase, ...userPrompts.filter(p => p.phase === 'fieldwork')],
                'reporting': [...LIBRARY_DATA.Reporting_Phase, ...userPrompts.filter(p => p.phase === 'reporting')],
                'followup': [...LIBRARY_DATA.Follow_up_Phase, ...userPrompts.filter(p => p.phase === 'followup')],
                'general': [...LIBRARY_DATA.General, ...userPrompts.filter(p => p.phase === 'general')],
            };
            return map[phase] || [];
        }

        function getAllPrompts() {
            return [
                ...LIBRARY_DATA.Planning_Phase.map(p => ({ ...p, _phase: 'planning' })),
                ...LIBRARY_DATA.Fieldwork_Phase.map(p => ({ ...p, _phase: 'fieldwork' })),
                ...LIBRARY_DATA.Reporting_Phase.map(p => ({ ...p, _phase: 'reporting' })),
                ...LIBRARY_DATA.Follow_up_Phase.map(p => ({ ...p, _phase: 'followup' })),
                ...LIBRARY_DATA.General.map(p => ({ ...p, _phase: 'general' })),
                ...userPrompts.map(p => ({ ...p, _phase: p.phase })),
            ];
        }

        function filterPrompts(prompts) {
            return prompts.filter(p => {
                const q = searchQuery.toLowerCase();
                const matchSearch = !q ||
                    (p.Prompt_ID && p.Prompt_ID.toLowerCase().includes(q)) ||
                    (p.Title && p.Title.toLowerCase().includes(q)) ||
                    (p.Purpose && p.Purpose.toLowerCase().includes(q)) ||
                    (p.Full_Prompt_Text && p.Full_Prompt_Text.toLowerCase().includes(q)) ||
                    (p.Variables && p.Variables.toLowerCase().includes(q)) ||
                    (p.Related_IIA_Standard && p.Related_IIA_Standard.toLowerCase().includes(q)) ||
                    (p.Methodology_Notes && p.Methodology_Notes.toLowerCase().includes(q));
                const matchSkill = filterSkill === 'all' || (p.Skill_Level && p.Skill_Level.toLowerCase() ===
                    filterSkill);
                const matchEng = filterEngType === 'all' || (p.Engagement_Type && p.Engagement_Type.toLowerCase() ===
                    filterEngType);
                return matchSearch && matchSkill && matchEng;
            });
        }

        function getRating(promptId) {
            const r = ratings[promptId];
            if (!r || r.count === 0) return { avg: 0, count: 0 };
            return { avg: Math.round(r.total / r.count), count: r.count };
        }

        function setRating(promptId, starVal) {
            if (!ratings[promptId]) ratings[promptId] = { total: 0, count: 0, userVote: 0 };
            const r = ratings[promptId];
            if (r.userVote > 0) return; // already voted
            r.total += starVal;
            r.count += 1;
            r.userVote = starVal;
            localStorage.setItem('promptRatings', JSON.stringify(ratings));
            showToast(`⭐ Rated ${starVal} star${starVal > 1 ? 's' : ''} for ${promptId}`);
            renderContent();
        }

        // ── Render Functions ──
        function renderStarRating(promptId, avg, count) {
            const r = ratings[promptId];
            const userVote = r ? r.userVote : 0;
            let html = '<div class="star-rating" data-pid="' + promptId + '">';
            for (let i = 1; i <= 5; i++) {
                const filled = i <= (userVote || avg) ? ' filled' : '';
                html += `<span class="star${filled}" data-star="${i}" onclick="event.stopPropagation();setRating('${promptId}',${i})">★</span>`;
            }
            html +=
                `<span class="avg-rating">${avg > 0 ? avg.toFixed(1) : '—'} (${count})</span></div>`;
            return html;
        }

        function renderPromptCard(p) {
            const r = getRating(p.Prompt_ID);
            const skillClass = (p.Skill_Level || 'Beginner').toLowerCase();
            const engClass = (p.Engagement_Type || 'Both').toLowerCase().replace(/\s+/g, '-');
            const engLabel = p.Engagement_Type || 'Both';
            const isUser = p._isUser || false;
            return `
            <div class="prompt-card ${isUser ? 'highlight-flash' : ''}" id="card-${p.Prompt_ID}">
              <div class="card-header">
                <span class="prompt-id">${p.Prompt_ID || 'CUSTOM'}</span>
                <span class="prompt-title">${p.Title || 'Untitled'}</span>
                <span style="margin-left:auto;font-size:0.7rem;color:#8899a0;">${p._phase ? p._phase.toUpperCase() : ''}${isUser ? ' · USER' : ''}</span>
              </div>
              <p class="purpose">🎯 ${p.Purpose || 'No purpose specified'}</p>
              <div class="tags">
                <span class="tag ${skillClass}">📊 ${p.Skill_Level || 'Beginner'}</span>
                <span class="tag ${engClass === 'both' ? 'both-eng' : engClass}">📋 ${engLabel}</span>
                ${p.Related_IIA_Standard ? `<span class="tag" style="background:#e8f0f3;color:#1a3f55;">📜 ${p.Related_IIA_Standard}</span>` : ''}
              </div>
              <div class="prompt-text-box" id="ptext-${p.Prompt_ID}">${p.Full_Prompt_Text || 'No prompt text'}</div>
              <div class="card-actions">
                <button class="copy-btn" id="copybtn-${p.Prompt_ID}" onclick="event.stopPropagation();copyPrompt('${p.Prompt_ID}')">📋 Copy Prompt</button>
                ${renderStarRating(p.Prompt_ID, r.avg, r.count)}
              </div>
              ${p.Variables ? `<div class="meta-row"><span>🔤 <strong>Variables:</strong> ${p.Variables}</span></div>` : ''}
              ${p.Methodology_Notes ? `<div class="methodology-callout"><strong>💡 Methodology:</strong> ${p.Methodology_Notes}</div>` : ''}
              ${p.Tips_for_Customization ? `<div class="meta-row" style="margin-top:6px;"><span>✏️ <strong>Tip:</strong> ${p.Tips_for_Customization}</span></div>` : ''}
              ${p.Example_Input ? `<div class="meta-row"><span>📥 <strong>Example Input:</strong> ${p.Example_Input}</span></div>` : ''}
              ${p.Example_Output ? `<div class="meta-row"><span>📤 <strong>Expected Output:</strong> ${p.Example_Output}</span></div>` : ''}
            </div>`;
        }

        function copyPrompt(promptId) {
            const all = getAllPrompts();
            const p = all.find(x => x.Prompt_ID === promptId);
            if (!p) return;
            const text = p.Full_Prompt_Text || '';
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copybtn-' + promptId);
                if (btn) {
                    btn.textContent = '✅ Copied!';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = '📋 Copy Prompt';
                        btn.classList.remove('copied');
                    }, 1800);
                }
                showToast('📋 Prompt copied to clipboard!');
            }).catch(() => showToast('⚠️ Copy failed'));
        }

        function renderDashboard() {
            const stats = LIBRARY_DATA.Dashboard.Template_Statistics;
            const totalUser = userPrompts.length;
            const totalAll = stats.Total_Prompts + totalUser;
            const steps = LIBRARY_DATA.Dashboard.How_to_Use_This_Library;
            const nav = LIBRARY_DATA.Dashboard.Quick_Navigation;
            return `
            <div class="dash-card">
              <h2>📊 ${LIBRARY_DATA.Dashboard.Title}</h2>
              <p style="color:var(--text-light);margin-bottom:8px;">${LIBRARY_DATA.Dashboard.Template_Overview}</p>
            </div>
            <div class="stats-bar">
              <div class="stat-mini"><div class="num">${totalAll}</div><div class="lbl">Total Prompts</div></div>
              <div class="stat-mini"><div class="num">${stats.Planning_Prompts}</div><div class="lbl">Planning</div></div>
              <div class="stat-mini"><div class="num">${stats.Fieldwork_Prompts}</div><div class="lbl">Fieldwork</div></div>
              <div class="stat-mini"><div class="num">${stats.Reporting_Prompts}</div><div class="lbl">Reporting</div></div>
              <div class="stat-mini"><div class="num">${stats.Follow_up_Prompts}</div><div class="lbl">Follow-up</div></div>
              <div class="stat-mini gold"><div class="num">${totalUser}</div><div class="lbl">User Submitted</div></div>
            </div>
            <div class="dash-card">
              <h3>🚀 How to Use This Library</h3>
              <ul>${steps.map(s => `<li>${s}</li>`).join('')}</ul>
            </div>
            <div class="dash-card">
              <h3>🗂️ Quick Navigation</h3>
              <ul>
                <li><strong>Planning Phase:</strong> ${nav.Planning_Phase}</li>
                <li><strong>Fieldwork Phase:</strong> ${nav.Fieldwork_Phase}</li>
                <li><strong>Reporting Phase:</strong> ${nav.Reporting_Phase}</li>
                <li><strong>Follow-up Phase:</strong> ${nav.Follow_up_Phase}</li>
                <li><strong>General Cross-Phase:</strong> ${nav.General_Cross_Phase}</li>
              </ul>
              <button class="btn btn-gold" onclick="openSubmitModal()" style="margin-top:12px;">➕ Submit New Prompt</button>
            </div>`;
        }

        function renderSettings() {
            const s = LIBRARY_DATA.Settings;
            return `
            <div class="dash-card">
              <h2>⚙️ Settings & Reference</h2>
              <h3>Skill Levels</h3>
              <p>${s.Skill_Levels.map(l => `<span class="tag ${l.toLowerCase()}">${l}</span>`).join(' ')}</p>
              <h3 style="margin-top:12px;">Engagement Types</h3>
              <p>${s.Engagement_Types.map(l => `<span class="tag ${l.toLowerCase() === 'both' ? 'both-eng' : l.toLowerCase()}">${l}</span>`).join(' ')}</p>
              <h3 style="margin-top:12px;">Status Values</h3>
              <p>${s.Status_Values.map(l => `<span class="tag" style="background:#e8f0f3;">${l}</span>`).join(' ')}</p>
              <h3 style="margin-top:12px;">IIA Standards Reference (2025)</h3>
              <div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;">
                ${s.Standards_Reference.map(r => `<p style="margin:3px 0;font-size:0.85rem;"><strong>${r.Standard}:</strong> ${r.Description}</p>`).join('')}
              </div>
            </div>`;
        }

        function renderChangeLog() {
            const log = LIBRARY_DATA.Change_Log;
            return `
            <div class="dash-card">
              <h2>📜 Change Log</h2>
              ${log.map(c => `
                <div style="border-bottom:1px solid var(--border);padding:10px 0;">
                  <strong>${c.Date}</strong> — v${c.Version} · ${c.Change_Type} · ${c.Prompt_ID}<br>
                  <span style="color:var(--text-light);font-size:0.85rem;">${c.Description_of_Change}</span>
                </div>`).join('')}
            </div>`;
        }

        function renderPhaseContent(phase) {
            const prompts = getPhasePrompts(phase);
            const filtered = filterPrompts(prompts);
            if (filtered.length === 0) {
                return `<div class="no-results"><span class="big-icon">🔍</span>No prompts match your search criteria.<br><span style="font-size:0.85rem;">Try adjusting filters or search terms.</span></div>`;
            }
            return filtered.map(p => renderPromptCard(p)).join('');
        }

        function renderContent() {
            const container = document.getElementById('mainContainer');
            let html = '';

            // Always show controls (except dashboard)
            if (currentTab !== 'dashboard' && currentTab !== 'settings' && currentTab !== 'changelog') {
                const prompts = getPhasePrompts(currentTab);
                const filtered = filterPrompts(prompts);
                html += `
              <div class="controls-row">
                <input type="text" class="search-input" placeholder="🔍 Search prompts by title, ID, text, standard..." value="${searchQuery}" oninput="updateSearch(this.value)">
                <select class="filter-select" onchange="updateSkillFilter(this.value)" value="${filterSkill}">
                  <option value="all" ${filterSkill==='all'?'selected':''}>📊 All Skill Levels</option>
                  <option value="beginner" ${filterSkill==='beginner'?'selected':''}>Beginner</option>
                  <option value="intermediate" ${filterSkill==='intermediate'?'selected':''}>Intermediate</option>
                  <option value="advanced" ${filterSkill==='advanced'?'selected':''}>Advanced</option>
                </select>
                <select class="filter-select" onchange="updateEngFilter(this.value)" value="${filterEngType}">
                  <option value="all" ${filterEngType==='all'?'selected':''}>📋 All Engagement Types</option>
                  <option value="assurance" ${filterEngType==='assurance'?'selected':''}>Assurance</option>
                  <option value="advisory" ${filterEngType==='advisory'?'selected':''}>Advisory</option>
                  <option value="both" ${filterEngType==='both'?'selected':''}>Both</option>
                </select>
                <span class="results-count">${filtered.length} prompt${filtered.length !== 1 ? 's' : ''}</span>
                <button class="btn btn-gold" onclick="openSubmitModal()">➕ Submit</button>
                <button class="btn btn-outline" onclick="clearFilters()">🔄 Clear</button>
              </div>`;
            }

            // Render main content
            if (currentTab === 'dashboard') {
                html += renderDashboard();
            } else if (currentTab === 'settings') {
                html += renderSettings();
            } else if (currentTab === 'changelog') {
                html += renderChangeLog();
            } else {
                html += renderPhaseContent(currentTab);
            }

            container.innerHTML = html;

            // Scroll to top of container
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updateSearch(val) {
            searchQuery = val;
            renderContent();
        }

        function updateSkillFilter(val) {
            filterSkill = val;
            renderContent();
        }

        function updateEngFilter(val) {
            filterEngType = val;
            renderContent();
        }

        function clearFilters() {
            searchQuery = '';
            filterSkill = 'all';
            filterEngType = 'all';
            renderContent();
            showToast('🔄 Filters cleared');
        }

        // ── Tab Switching ──
        function switchTab(tab) {
            currentTab = tab;
            searchQuery = '';
            filterSkill = 'all';
            filterEngType = 'all';
            document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`.tab-nav button[data-tab="${tab}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            renderContent();
        }

        // ── Submit Modal ──
        function openSubmitModal() {
            document.getElementById('submitModal').classList.add('open');
            document.getElementById('sID').value = '';
            document.getElementById('sTitle').value = '';
            document.getElementById('sPurpose').value = '';
            document.getElementById('sPromptText').value = '';
            document.getElementById('sVars').value = '';
            document.getElementById('sPhase').value = '';
            document.getElementById('sSkill').value = 'Beginner';
            document.getElementById('sEngType').value = 'Both';
            document.getElementById('sStandard').value = '';
            document.getElementById('sMethodology').value = '';
            document.getElementById('sTips').value = '';
        }

        function closeSubmitModal() {
            document.getElementById('submitModal').classList.remove('open');
        }

        function handleSubmit(e) {
            e.preventDefault();
            const newPrompt = {
                Prompt_ID: document.getElementById('sID').value.trim(),
                Title: document.getElementById('sTitle').value.trim(),
                Purpose: document.getElementById('sPurpose').value.trim(),
                Full_Prompt_Text: document.getElementById('sPromptText').value.trim(),
                Variables: document.getElementById('sVars').value.trim(),
                phase: document.getElementById('sPhase').value,
                Skill_Level: document.getElementById('sSkill').value,
                Engagement_Type: document.getElementById('sEngType').value,
                Related_IIA_Standard: document.getElementById('sStandard').value.trim(),
                Methodology_Notes: document.getElementById('sMethodology').value.trim(),
                Tips_for_Customization: document.getElementById('sTips').value.trim(),
                _isUser: true,
                _phase: document.getElementById('sPhase').value,
            };
            userPrompts.push(newPrompt);
            localStorage.setItem('userPrompts', JSON.stringify(userPrompts));
            closeSubmitModal();
            showToast('✅ Prompt submitted successfully!');
            // Switch to the phase tab
            switchTab(newPrompt.phase);
            // Scroll to new card
            setTimeout(() => {
                const card = document.getElementById('card-' + newPrompt.Prompt_ID);
                if (card) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.classList.add('highlight-flash');
                }
            }, 400);
        }

        // ── Event Listeners ──
        document.querySelectorAll('.tab-nav button').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // Close modal on overlay click
        document.getElementById('submitModal').addEventListener('click', function(e) {
            if (e.target === this) closeSubmitModal();
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                const searchInput = document.querySelector('.search-input');
                if (searchInput) searchInput.focus();
            }
            if (e.key === 'Escape') closeSubmitModal();
        });

        // ── Initialize ──
        switchTab('dashboard');

        console.log('%c🔍 Internal Audit AI Prompt Library %cReady %c| %cIIA Standards 2025',
            'color:#FEBE10;font-weight:bold;font-size:1.1em;',
            'color:#28A745;',
            '',
            'color:#005F75;');
        console.log('%c📋 44 built-in prompts + user submissions | 📊 Star ratings saved locally | 🔍 Ctrl+F to search',
            'color:#003946;');
    </script>
</body>
  </html>
