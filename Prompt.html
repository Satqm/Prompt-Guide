<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Audit AI Prompt Library – Interactive Dashboard</title>
    <style>
        :root {
            --dark-teal: #003946;
            --secondary-teal: #005F75;
            --accent-gold: #FEBE10;
            --background: #F0F4F5;
            --success-green: #28A745;
            --alert-red: #E63946;
            --card-white: #FFFFFF;
            --text: #1A2E35;
            --text-light: #2d4a54;
            --border: #dde6ea;
            --shadow-sm: 0 2px 8px rgba(0, 35, 45, 0.05);
            --shadow-md: 0 6px 20px rgba(0, 35, 45, 0.09);
            --shadow-lg: 0 12px 32px rgba(0, 35, 45, 0.12);
            --radius-sm: 8px;
            --radius: 14px;
            --radius-lg: 18px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 140px;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            background: linear-gradient(150deg, var(--dark-teal) 0%, #00232e 55%, var(--secondary-teal) 100%);
            color: #fff;
            padding: 28px 20px 32px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.01em;
        }
        .header h1 span {
            color: var(--accent-gold);
        }
        .header .subtitle {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 2px;
            letter-spacing: 0.03em;
        }
        .header .badge-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }
        .header .pill {
            display: inline-block;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 14px;
            font-size: 0.72rem;
            letter-spacing: 0.03em;
        }
        .header .pill.gold {
            background: var(--accent-gold);
            color: var(--dark-teal);
            border: none;
            font-weight: 700;
        }

        /* ── Tab Navigation ── */
        .tab-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 14px 16px;
            background: var(--card-white);
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 999;
            justify-content: center;
            box-shadow: var(--shadow-sm);
        }
        .tab-nav button {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            letter-spacing: 0.02em;
            transition: var(--transition);
            color: var(--text);
            white-space: nowrap;
        }
        .tab-nav button:hover {
            border-color: var(--secondary-teal);
            background: #f5f9fa;
        }
        .tab-nav button.active {
            background: var(--dark-teal);
            color: #fff;
            border-color: var(--dark-teal);
            box-shadow: 0 3px 12px rgba(0, 57, 70, 0.25);
        }
        .tab-nav button .count {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-left: 4px;
        }

        /* ── Container ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 18px 16px 40px;
        }

        /* ── Search & Controls ── */
        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 18px;
            background: var(--card-white);
            padding: 14px 18px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 2px solid var(--border);
            border-radius: 24px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
            background: #fafcfc;
            color: var(--text);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 4px rgba(254, 190, 16, 0.07);
            background: #fff;
        }
        .filter-select {
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 600;
            background: #fafcfc;
            cursor: pointer;
            color: var(--text);
            min-width: 130px;
            transition: var(--transition);
        }
        .filter-select:focus {
            outline: none;
            border-color: var(--secondary-teal);
        }
        .btn {
            padding: 10px 18px;
            border-radius: 22px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 0.85rem;
            letter-spacing: 0.03em;
            transition: var(--transition);
            white-space: nowrap;
        }
        .btn-gold {
            background: var(--accent-gold);
            color: var(--dark-teal);
        }
        .btn-gold:hover {
            background: #e5a800;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(254, 190, 16, 0.3);
        }
        .btn-teal {
            background: var(--secondary-teal);
            color: #fff;
        }
        .btn-teal:hover {
            background: #004a5c;
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0, 95, 117, 0.3);
        }
        .btn-outline {
            background: #fff;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--secondary-teal);
            background: #f5f9fa;
        }
        .results-count {
            font-weight: 700;
            color: var(--secondary-teal);
            font-size: 0.9rem;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ── Stats Bar ── */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-mini {
            background: var(--card-white);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            text-align: center;
            flex: 1;
            min-width: 70px;
        }
        .stat-mini .num {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--dark-teal);
        }
        .stat-mini .lbl {
            font-size: 0.68rem;
            color: #5a7079;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .stat-mini.gold .num {
            color: #c48f00;
        }

        /* ── Prompt Card ── */
        .prompt-card {
            background: var(--card-white);
            border-radius: var(--radius-lg);
            padding: 22px 24px;
            margin: 12px 0;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            animation: fadeSlide 0.4s ease-out;
        }
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .prompt-card:hover {
            box-shadow: var(--shadow-md);
            border-color: #c8d8dd;
        }
        .prompt-card .card-header {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }
        .prompt-card .prompt-id {
            font-weight: 800;
            font-size: 0.8rem;
            color: var(--secondary-teal);
            letter-spacing: 0.04em;
            background: #eaf3f5;
            padding: 3px 10px;
            border-radius: 12px;
            white-space: nowrap;
        }
        .prompt-card .prompt-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-teal);
            flex: 1;
            min-width: 200px;
        }
        .prompt-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }
        .tag.beginner {
            background: #d4f0d9;
            color: #1a5c28;
        }
        .tag.intermediate {
            background: #fef3c7;
            color: #7a5e00;
        }
        .tag.advanced {
            background: #fde0e3;
            color: #8b1a24;
        }
        .tag.assurance {
            background: #d6eaf8;
            color: #1a3f5c;
        }
        .tag.advisory {
            background: #e8daef;
            color: #4a1d6b;
        }
        .tag.both-eng {
            background: #dceef5;
            color: #1a4055;
        }
        .prompt-card .purpose {
            color: var(--text-light);
            font-size: 0.88rem;
            margin: 6px 0 10px;
            font-style: italic;
        }
        .prompt-card .prompt-text-box {
            background: #f8fafb;
            border: 2px solid #e4ecef;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
            font-size: 0.82rem;
            white-space: pre-wrap;
            max-height: 180px;
            overflow-y: auto;
            position: relative;
            line-height: 1.5;
            color: var(--text);
            transition: var(--transition);
        }
        .prompt-text-box::-webkit-scrollbar {
            width: 5px;
        }
        .prompt-text-box::-webkit-scrollbar-thumb {
            background: #c5d4d9;
            border-radius: 3px;
        }
        .prompt-card .card-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
            align-items: center;
        }
        .copy-btn {
            background: var(--secondary-teal);
            color: #fff;
            border: none;
            padding: 7px 14px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.03em;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .copy-btn:hover {
            background: #004a5c;
            transform: scale(1.03);
        }
        .copy-btn.copied {
            background: var(--success-green);
        }
        .star-rating {
            display: flex;
            gap: 2px;
            cursor: pointer;
            user-select: none;
        }
        .star-rating .star {
            font-size: 1.3rem;
            color: #d0dde2;
            transition: var(--transition);
            cursor: pointer;
        }
        .star-rating .star.filled {
            color: var(--accent-gold);
        }
        .star-rating .star:hover {
            transform: scale(1.2);
        }
        .avg-rating {
            font-size: 0.78rem;
            font-weight: 700;
            color: #7a5e00;
            margin-left: 4px;
        }
        .prompt-card .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.75rem;
            color: #5a7079;
            margin-top: 6px;
        }
        .prompt-card .meta-row span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* ── Methodology Callout ── */
        .methodology-callout {
            background: #fefdf6;
            border-left: 4px solid var(--accent-gold);
            padding: 10px 14px;
            margin-top: 8px;
            border-radius: 0 8px 8px 0;
            font-size: 0.82rem;
            color: #5a4a1a;
            line-height: 1.5;
        }
        .methodology-callout strong {
            color: var(--dark-teal);
        }

        /* ── Submit Form Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 30, 38, 0.7);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal {
            background: var(--card-white);
            border-radius: var(--radius-lg);
            padding: 28px;
            max-width: 700px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            position: relative;
        }
        .modal h2 {
            color: var(--dark-teal);
            margin-bottom: 16px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal .form-group {
            margin-bottom: 12px;
        }
        .modal label {
            display: block;
            font-weight: 700;
            font-size: 0.82rem;
            color: var(--secondary-teal);
            margin-bottom: 4px;
            letter-spacing: 0.02em;
        }
        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.88rem;
            transition: var(--transition);
            background: #fafcfc;
            color: var(--text);
            resize: vertical;
        }
        .modal input:focus,
        .modal textarea:focus,
        .modal select:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 4px rgba(254, 190, 16, 0.06);
            background: #fff;
        }
        .modal .btn-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #8899a0;
            transition: var(--transition);
            font-weight: 700;
        }
        .modal .btn-close:hover {
            color: var(--alert-red);
        }
        .modal .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        @media (max-width: 500px) {
            .modal .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark-teal);
            color: #fff;
            padding: 12px 22px;
            border-radius: 28px;
            font-weight: 700;
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
            box-shadow: var(--shadow-lg);
            font-size: 0.85rem;
            letter-spacing: 0.03em;
        }
        .toast.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8899a0;
        }
        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .empty-state p {
            font-size: 1rem;
            font-weight: 600;
        }

        /* ── Dashboard Card ── */
        .dash-card {
            background: var(--card-white);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin: 12px 0;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .dash-card h3 {
            color: var(--dark-teal);
            margin-bottom: 10px;
        }
        .dash-card ul {
            padding-left: 20px;
            color: var(--text-light);
        }
        .dash-card ul li {
            margin: 4px 0;
            font-size: 0.9rem;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.3rem;
            }
            .tab-nav button {
                padding: 6px 10px;
                font-size: 0.7rem;
            }
            .prompt-card {
                padding: 16px;
            }
            .prompt-card .prompt-text-box {
                font-size: 0.75rem;
                max-height: 140px;
            }
            .controls-row {
                flex-direction: column;
                align-items: stretch;
            }
            .search-input {
                width: 100%;
            }
            .filter-select {
                width: 100%;
            }
        }

        /* ── Highlight animation ── */
        .highlight-flash {
            animation: highlightFlash 1.5s ease-out;
        }
        @keyframes highlightFlash {
            0% {
                box-shadow: 0 0 0 8px rgba(254, 190, 16, 0.4);
            }
            100% {
                box-shadow: 0 0 0 0px rgba(254, 190, 16, 0);
            }
        }

        /* ── No results ── */
        .no-results {
            text-align: center;
            padding: 50px 20px;
            color: #8899a0;
            font-weight: 600;
            font-size: 1rem;
        }
        .no-results .big-icon {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <h1>🔍 Internal Audit <span>AI Prompt Library</span></h1>
        <p class="subtitle">Interactive Dashboard · IIA Global Standards 2025 Aligned · 44 Prompts</p>
        <div class="badge-row">
            <span class="pill gold">Version 1.1</span>
            <span class="pill">Planning: 10</span>
            <span class="pill">Fieldwork: 12</span>
            <span class="pill">Reporting: 10</span>
            <span class="pill">Follow-up: 6</span>
            <span class="pill">General: 6</span>
        </div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tab-nav" id="tabNav">
        <button data-tab="dashboard" class="active">📊 Dashboard</button>
        <button data-tab="planning">📋 Planning<span class="count">10</span></button>
        <button data-tab="fieldwork">🔬 Fieldwork<span class="count">12</span></button>
        <button data-tab="reporting">📝 Reporting<span class="count">10</span></button>
        <button data-tab="followup">✅ Follow-up<span class="count">6</span></button>
        <button data-tab="general">🔧 General<span class="count">6</span></button>
        <button data-tab="settings">⚙️ Settings</button>
        <button data-tab="changelog">📜 Change Log</button>
    </nav>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <!-- Dynamic content renders here -->
    </div>

    <!-- Submit Prompt Modal -->
    <div class="modal-overlay" id="submitModal">
        <div class="modal">
            <button class="btn-close" onclick="closeSubmitModal()">✕</button>
            <h2>📝 Submit a New Prompt</h2>
            <form id="submitForm" onsubmit="handleSubmit(event)">
                <div class="form-row">
                    <div class="form-group"><label>Prompt ID *</label><input type="text" id="sID" placeholder="e.g., PLAN-011" required></div>
                    <div class="form-group"><label>Title *</label><input type="text" id="sTitle" placeholder="e.g., New Risk Assessment" required></div>
                </div>
                <div class="form-group"><label>Purpose</label><input type="text" id="sPurpose" placeholder="Brief purpose of this prompt"></div>
                <div class="form-group"><label>Full Prompt Text *</label><textarea id="sPromptText" rows="5" placeholder="Paste the full prompt with {{variables}}..." required></textarea></div>
                <div class="form-group"><label>Variables</label><input type="text" id="sVars" placeholder="e.g., {{audit_area}}, {{process_name}}"></div>
                <div class="form-row">
                    <div class="form-group"><label>Phase *</label><select id="sPhase" required><option value="">Select...</option><option value="planning">Planning</option><option value="fieldwork">Fieldwork</option><option value="reporting">Reporting</option><option value="followup">Follow-up</option><option value="general">General</option></select></div>
                    <div class="form-group"><label>Skill Level</label><select id="sSkill"><option value="Beginner">Beginner</option><option value="Intermediate">Intermediate</option><option value="Advanced">Advanced</option></select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Engagement Type</label><select id="sEngType"><option value="Both">Both</option><option value="Assurance">Assurance</option><option value="Advisory">Advisory</option></select></div>
                    <div class="form-group"><label>Related IIA Standard</label><input type="text" id="sStandard" placeholder="e.g., Standard 13.2"></div>
                </div>
                <div class="form-group"><label>Methodology Notes</label><textarea id="sMethodology" rows="2" placeholder="Explain WHY this audit step matters..."></textarea></div>
                <div class="form-group"><label>Tips for Customization</label><textarea id="sTips" rows="2" placeholder="Guidance on adapting the prompt..."></textarea></div>
                <button type="submit" class="btn btn-gold" style="width:100%;margin-top:6px;">✅ Submit Prompt</button>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ── EMBEDDED PROMPT LIBRARY DATA ──
        const LIBRARY_DATA = {
            "Dashboard": {
                "Title": "INTERNAL AUDIT AI PROMPT LIBRARY",
                "Template_Overview": "This prompt library provides AI prompts aligned with IIA Global Internal Audit Standards (effective January 2025) for both assurance and advisory engagements. Prompts are organized by audit phase with embedded methodology guidance for staff development.",
                "Quick_Navigation": {
                    "Planning_Phase": "PLAN-001 through PLAN-010",
                    "Fieldwork_Phase": "FIELD-001 through FIELD-012",
                    "Reporting_Phase": "RPT-001 through RPT-010",
                    "Follow_up_Phase": "FU-001 through FU-006",
                    "General_Cross_Phase": "GEN-001 through GEN-006",
                    "Settings": "Dropdown values and standards reference",
                    "Change_Log": "Version history and approvals"
                },
                "Template_Statistics": { "Total_Prompts": 44, "Planning_Prompts": 10, "Fieldwork_Prompts": 12,
                    "Reporting_Prompts": 10, "Follow_up_Prompts": 6, "General_Prompts": 6 },
                "How_to_Use_This_Library": [
                    "1. Navigate to the appropriate phase tab based on your current audit activity",
                    "2. Identify prompts matching your task - use Skill Level to find appropriate complexity",
                    "3. Copy the Full Prompt Text and replace {{variables}} with your specific information",
                    "4. Review Methodology Notes to understand the \"why\" behind the audit step",
                    "5. Compare your output against Example Output for quality benchmarking",
                    "6. Customize using Tips column guidance for engagement-specific needs"
                ]
            },
            "Settings": {
                "Skill_Levels": ["Beginner", "Intermediate", "Advanced"],
